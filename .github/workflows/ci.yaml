name: Build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup NodeJS
        uses: actions/setup-node@v3
      - name: Install Honkit & Dependencies
        run: |
          sudo apt-get update
          sudo apt -y install libgif-dev calibre
          npm install
      - name: Build PDF
        run: npx honkit pdf
      - name: Build EPUB
        run: npx honkit epub
      - name: Build MOBI
        run: npx honkit mobi
      - name: Move to Output Dir
        run: |
          rm -rf book/
          mkdir book/
          mv book.pdf book/quran.pdf
          mv book.epub book/quran.epub
          mv book.mobi book/quran.mobi
      - name: Commit Files
        run: |
          git config --local user.name  ${{ github.actor }}        
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git add ./book
          git commit -m "chore: Generate e-book"
      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true

      